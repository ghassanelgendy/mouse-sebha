name: Build and Release Executable

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_repo.outputs.new_tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine and Push New Tag
      id: tag_repo
      shell: bash
      run: |
        git fetch --tags
        latest_tag=$(git tag -l "v*" | sort -V | tail -n 1)
        if [ -z "$latest_tag" ]; then
          new_tag="v1.0.0"
        else
          version_part="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version_part"
          if ! [[ "$patch" =~ ^[0-9]+$ ]]; then patch=0; fi
          if ! [[ "$minor" =~ ^[0-9]+$ ]]; then minor=0; fi
          if ! [[ "$major" =~ ^[0-9]+$ ]]; then major=1; fi
          new_patch=$((patch + 1))
          new_tag="v$major.$minor.$new_patch"
        fi
        echo "NEW_TAG=$new_tag" >> $GITHUB_ENV
        echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
        echo "New tag: $new_tag"
        
        # Dynamically update APP_VERSION in main.pyw and installer.iss
        python -c "import re; f=open('main.pyw','r',encoding='utf-8'); c=f.read(); f.close(); c=re.sub(r'APP_VERSION\s*=\s*\"[^\"]+\"', 'APP_VERSION = \"$new_tag\"', c); f=open('main.pyw','w',encoding='utf-8'); f.write(c); f.close()"
        python -c "import re; f=open('installer.iss','r',encoding='utf-8'); c=f.read(); f.close(); c=re.sub(r'#define AppVersion\s*\"[^\"]+\"', '#define AppVersion \"$new_tag\"', c); f=open('installer.iss','w',encoding='utf-8'); f.write(c); f.close()"
        
        # Configure Git
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Commit updated version back to repo
        git add main.pyw installer.iss
        git commit -m "Bump version to $new_tag [skip ci]" || echo "No changes to commit"
        git push origin main || echo "No changes to push"
        
        # Create and push tag
        git tag $new_tag
        git push origin $new_tag

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            os-name: Windows
            artifact_name: Sebha-Windows.exe
            separator: ";"
          - os: ubuntu-latest
            os-name: Linux
            artifact_name: Sebha-Linux
            separator: ":"
          - os: macos-latest
            os-name: macOS
            artifact_name: Sebha-macOS
            separator: ":"
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.tag.outputs.new_tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pillow
        pip install --force-reinstall --no-binary :all: pyinstaller

    - name: Install dependencies (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Build Executable with PyInstaller
      shell: bash
      run: |
        pyinstaller --noconsole --onefile --icon=assets/logo.ico --add-data "assets${{ matrix.separator }}assets" --add-data "db.json${{ matrix.separator }}." --name ${{ matrix.artifact_name }} main.pyw

    - name: Compile Inno Setup Installer (Windows only)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Odist installer.iss

    - name: Create / Update Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/${{ matrix.artifact_name }}
          dist/Sebha-Windows-Setup.exe
        fail_on_unmatched_files: false
        tag_name: ${{ needs.tag.outputs.new_tag }}
        name: Release ${{ needs.tag.outputs.new_tag }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
